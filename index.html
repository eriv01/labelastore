<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>LA BELA STORE</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,600&family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Montserrat', sans-serif;
    }

    /* IMAGEM COBRE 100% DA TELA */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: url('https://doram.shop/wp-content/uploads/2026/03/grok-image-7cf83bbd-f371-4028-b5d5-1b325edca190.jpg');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
    }

    /* overlay suave só na parte de baixo p/ legibilidade */
    .bg::after {
      content: '';
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 45%;
      background: linear-gradient(to top, rgba(252,220,232,0.82) 0%, transparent 100%);
      z-index: 1;
    }

    /* SPARKLES */
    .sparkles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      overflow: hidden;
    }
    .sparkle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, #ffe8b0, #c9a96e);
      opacity: 0;
      animation: sparkleAnim var(--dur) ease-in-out var(--delay) infinite;
    }
    @keyframes sparkleAnim {
      0%   { opacity: 0; transform: scale(0) translateY(0); }
      40%  { opacity: 0.5; }
      100% { opacity: 0; transform: scale(1.5) translateY(-60px); }
    }

    /* CONTEÚDO fixado na parte inferior */
    .content {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 28px 24px;
      max-width: 430px;
      margin: 0 auto;
    }

    /* CARD NOME DA LOJA */
    .store-card {
      position: fixed;
      top: 4%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      width: calc(100% - 48px);
      max-width: 340px;
      height: 56vh;
      background: linear-gradient(160deg, rgba(255,235,243,0.6) 0%, rgba(248,210,225,0.65) 100%);
      border: 1.5px solid rgba(201,169,110,0.8);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      box-shadow:
        0 4px 30px rgba(181,96,122,0.12),
        inset 0 1px 0 rgba(255,255,255,0.5);
    }
    .store-card .name-la {
      font-family: 'Cormorant Garamond', serif;
      font-size: 80px;
      font-weight: 700;
      color: #6b2e48;
      line-height: 0.9;
      letter-spacing: 2px;
    }
    .store-card .name-bella {
      font-family: 'Cormorant Garamond', serif;
      font-size: 46px;
      font-weight: 700;
      color: #6b2e48;
      letter-spacing: 8px;
      text-transform: uppercase;
      line-height: 1.1;
      margin-top: 4px;
    }
    .store-card .name-store {
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: #6b2e48;
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-top: 6px;
      opacity: 0.85;
    }


    .divider {
      width: 50px;
      height: 1px;
      background: linear-gradient(to right, transparent, #c9a96e, transparent);
      margin-bottom: 12px;
      position: relative;
    }
    .divider::after {
      content: '◆';
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      color: #c9a96e;
      font-size: 7px;
      background: transparent;
      padding: 0 3px;
    }

    /* headline */
    .headline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 19px;
      color: #5a2d42;
      text-align: center;
      line-height: 1.65;
      margin-bottom: 16px;
    }
    .headline strong { color: #b5607a; font-weight: 600; }

    /* BOTÃO */
    .btn-wa {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      max-width: 360px;
      background: linear-gradient(135deg, #2e7d4f 0%, #43a868 50%, #66bb8a 100%);
      background-size: 200% 200%;
      color: #fff;
      text-decoration: none;
      padding: 16px 22px;
      border-radius: 60px;
      box-shadow: 0 8px 24px rgba(46,125,79,0.4), inset 0 1px 0 rgba(255,255,255,0.25);
      animation: gradientShift 4s ease infinite, fadeUp 0.8s ease both;
      transition: transform 0.18s;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-wa:active { transform: scale(0.96); }
    .btn-wa::before {
      content: '';
      position: absolute;
      top: 0; left: -80%;
      width: 55%; height: 100%;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.28), transparent);
      transform: skewX(-18deg);
      animation: shimmer 2.6s ease infinite;
    }

    .wa-icon { flex-shrink: 0; width: 28px; height: 28px; }
    .btn-text { display: flex; flex-direction: column; align-items: flex-start; line-height: 1.25; }
    .btn-text .main { font-size: 15px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; color: #fff; }
    .btn-text .sub  { font-size: 11px; font-weight: 500; opacity: 0.9; letter-spacing: 0.8px; color: #fff; }

    .footer { margin-top: 10px; text-align: center; }
    .footer p { font-size: 8px; color: #8a4060; letter-spacing: 1.2px; text-transform: uppercase; opacity: 0.6; }

    @keyframes gradientShift {
      0%,100% { background-position: 0% 50%; }
      50%     { background-position: 100% 50%; }
    }
    @keyframes shimmer {
      0%   { left: -80%; }
      100% { left: 130%; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="sparkles" id="sparkles"></div>

  <!-- CARD NOME DA LOJA -->
  <div class="store-card">
    <div class="name-la">La</div>
    <div class="name-bella">Bella</div>
    <div class="name-store">Store</div>
  </div>

  <div class="content">
    <div class="divider"></div>

    <p class="headline">
      Peças <strong>exclusivas</strong> para mulheres que sabem o que querem.<br>
      Estilo, elegância e atendimento <strong>personalizado</strong>.
    </p>

    <a
      class="btn-wa"
      href="https://wa.me/5547992864585?text=Ol%C3%A1!%20Seja%20muito%20bem-vinda(o)%20%C3%A0%20nossa%20loja%20%F0%9F%8C%B8%0AObrigada%20por%20entrar%20em%20contato!%20Em%20breve%20vou%20te%20atender%20e%20te%20mostrar%20nossas%20novidades%20dispon%C3%ADveis.%0AFique%20%C3%A0%20vontade%20para%20j%C3%A1%20me%20contar%20o%20que%20voc%C3%AA%20est%C3%A1%20procurando.%20%F0%9F%92%96"
      target="_blank"
      rel="noopener noreferrer"
    >
      <svg class="wa-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="16" cy="16" r="16" fill="rgba(255,255,255,0.18)"/>
        <path fill="#fff" d="M16 5.5C10.2 5.5 5.5 10.2 5.5 16c0 1.9.5 3.7 1.4 5.3L5.5 26.5l5.4-1.4c1.5.8 3.3 1.3 5.1 1.3 5.8 0 10.5-4.7 10.5-10.5S21.8 5.5 16 5.5zm5.2 14.6c-.2.6-1.2 1.1-1.7 1.2-.4.1-.9.1-2.9-.6-2.4-.9-4-3.2-4.1-3.4-.1-.1-1-1.3-1-2.6s.7-1.9.9-2.1c.2-.2.4-.3.6-.3h.4c.2 0 .3 0 .5.4l.7 1.7c.1.2.1.4 0 .5l-.3.5-.4.4c-.1.1-.2.3-.1.5.5.8 1.1 1.6 1.8 2.2.8.7 1.6 1.1 1.9 1.2.2.1.4 0 .5-.1l.5-.6c.1-.2.3-.2.5-.1l1.7.8c.2.1.4.2.4.3.1.3 0 1-.1 1.3z"/>
      </svg>
      <div class="btn-text">
        <span class="main">Ser Bem Atendida Agora 💖</span>
        <span class="sub">Fale conosco no WhatsApp</span>
      </div>
    </a>

    <div class="footer">
      <p>© 2025 La Bela Store · Todos os direitos reservados</p>
    </div>
  </div>

  <script>
    const c = document.getElementById('sparkles');
    for (let i = 0; i < 16; i++) {
      const s = document.createElement('div');
      s.className = 'sparkle';
      const size = Math.random() * 5 + 3;
      s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*80}%;--dur:${(Math.random()*3+2).toFixed(1)}s;--delay:${(Math.random()*5).toFixed(1)}s;`;
      c.appendChild(s);
    }
  </script>
</body>
</html>
