<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="LA BELA STORE — Moda feminina exclusiva. Seja bem-atendida agora!">
  <title>LA BELA STORE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --pink:        #e8a0b0;
      --pink-deep:   #c96e8a;
      --pink-light:  #f7d6e0;
      --gold:        #c9a96e;
      --gold-light:  #e8d5a3;
      --white:       #ffffff;
      --text-dark:   #3a1a24;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #fce8ef;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100svh;
    }

    /* ── PAGE WRAPPER ── */
    .page {
      position: relative;
      width: 100%;
      max-width: 430px;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    /* ── BACKGROUND ── */
    .bg {
      position: fixed;
      inset: 0;
      width: 100%;
      max-width: 430px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 0;
      background-image: url('bg-labela.png');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
    }
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(252,220,232,0.08);
    }

    .content {
      position: relative;
      z-index: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      padding: 28px;
    }

    /* ── CROWN ANIMATION ── */
    .crown-wrap {
      margin-bottom: 28px;
      animation: crownPulse 2.8s ease-in-out infinite;
      filter: drop-shadow(0 4px 24px rgba(201,169,110,0.45));
    }
    @keyframes crownPulse {
      0%, 100% { transform: scale(1) rotate(-2deg); }
      50%       { transform: scale(1.07) rotate(2deg); }
    }
    .crown-icon {
      font-size: 52px;
      line-height: 1;
      display: block;
    }

    /* ── STORE NAME ── */
    .store-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 38px;
      font-weight: 700;
      color: var(--text-dark);
      letter-spacing: 3px;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.1;
      margin-bottom: 6px;
      text-shadow: 0 2px 12px rgba(201,169,110,0.25);
      animation: fadeDown 0.8s ease both;
    }

    .store-tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      font-style: italic;
      color: var(--pink-deep);
      letter-spacing: 2px;
      text-align: center;
      margin-bottom: 40px;
      animation: fadeDown 0.9s ease both;
    }

    /* gold divider */
    .divider {
      width: 80px;
      height: 1.5px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      margin: 0 auto 40px;
      animation: fadeIn 1.2s ease both;
    }

    /* ── WHATSAPP BUTTON ── */
    .btn-whatsapp {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      width: 100%;
      max-width: 340px;
      background: linear-gradient(135deg, #c96e8a 0%, #e8a0b0 50%, #c9a96e 100%);
      background-size: 200% 200%;
      color: #fff;
      text-decoration: none;
      padding: 18px 28px;
      border-radius: 60px;
      font-family: 'Montserrat', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      box-shadow:
        0 8px 32px rgba(201,110,138,0.38),
        0 2px 8px rgba(201,169,110,0.18),
        inset 0 1px 0 rgba(255,255,255,0.25);
      animation:
        fadeUp 1s ease 0.4s both,
        gradientShift 3s ease infinite;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    /* shimmer sweep */
    .btn-whatsapp::before {
      content: '';
      position: absolute;
      top: 0; left: -75%;
      width: 50%; height: 100%;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.28), transparent);
      transform: skewX(-20deg);
      animation: shimmer 2.4s ease infinite;
    }

    .btn-whatsapp:active {
      transform: scale(0.97);
      box-shadow: 0 4px 16px rgba(201,110,138,0.3);
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50%       { background-position: 100% 50%; }
    }
    @keyframes shimmer {
      0%   { left: -75%; }
      100% { left: 125%; }
    }

    /* WhatsApp SVG icon */
    .wa-icon {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,0.18));
    }

    .btn-label {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      line-height: 1.2;
    }
    .btn-label .cta-main {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .btn-label .cta-sub {
      font-size: 10px;
      font-weight: 400;
      opacity: 0.85;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ── FLOATING SPARKLES ── */
    .sparkles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      max-width: 430px;
      left: 50%;
      transform: translateX(-50%);
      overflow: hidden;
    }
    .sparkle {
      position: absolute;
      border-radius: 50%;
      background: var(--gold-light);
      opacity: 0;
      animation: sparkleAnim var(--dur) ease-in-out var(--delay) infinite;
    }
    @keyframes sparkleAnim {
      0%   { opacity: 0; transform: scale(0) translateY(0); }
      30%  { opacity: 0.7; }
      100% { opacity: 0; transform: scale(1.4) translateY(-60px); }
    }

    /* ── FOOTER ── */
    .footer {
      position: relative;
      z-index: 1;
      margin-top: auto;
      padding: 24px 0 16px;
      text-align: center;
    }
    .footer p {
      font-size: 10px;
      color: var(--pink-deep);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      opacity: 0.7;
    }

    /* ── ENTRANCE ANIMATIONS ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- Background -->
  <div class="bg"></div>

  <!-- Floating sparkles -->
  <div class="sparkles" id="sparkles"></div>

  <div class="page">
    <div class="content">



      <!-- WhatsApp CTA -->
      <a
        class="btn-whatsapp"
        href="https://wa.me/5547992864585?text=Ol%C3%A1!%20Seja%20muito%20bem-vinda(o)%20%C3%A0%20nossa%20loja%20%F0%9F%8C%B8%0AObrigada%20por%20entrar%20em%20contato!%20Em%20breve%20vou%20te%20atender%20e%20te%20mostrar%20nossas%20novidades%20dispon%C3%ADveis.%0AFique%20%C3%A0%20vontade%20para%20j%C3%A1%20me%20contar%20o%20que%20voc%C3%AA%20est%C3%A1%20procurando.%20%F0%9F%92%96"
        target="_blank"
        rel="noopener noreferrer"
      >
        <!-- WhatsApp SVG -->
        <svg class="wa-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="16" cy="16" r="16" fill="rgba(255,255,255,0.2)"/>
          <path fill="#fff" d="M16 5.5C10.2 5.5 5.5 10.2 5.5 16c0 1.9.5 3.7 1.4 5.3L5.5 26.5l5.4-1.4c1.5.8 3.3 1.3 5.1 1.3 5.8 0 10.5-4.7 10.5-10.5S21.8 5.5 16 5.5zm5.2 14.6c-.2.6-1.2 1.1-1.7 1.2-.4.1-.9.1-2.9-.6-2.4-.9-4-3.2-4.1-3.4-.1-.1-1-1.3-1-2.6s.7-1.9.9-2.1c.2-.2.4-.3.6-.3h.4c.2 0 .3 0 .5.4l.7 1.7c.1.2.1.4 0 .5l-.3.5-.4.4c-.1.1-.2.3-.1.5.5.8 1.1 1.6 1.8 2.2.8.7 1.6 1.1 1.9 1.2.2.1.4 0 .5-.1l.5-.6c.1-.2.3-.2.5-.1l1.7.8c.2.1.4.2.4.3.1.3 0 1-.1 1.3z"/>
        </svg>

        <div class="btn-label">
          <span class="cta-main">Ser Bem Atendida Agora</span>
          <span class="cta-sub">Fale conosco no WhatsApp ✨</span>
        </div>
      </a>

    </div>

    <div class="footer">
      <p>© 2025 La Bela Store · Todos os direitos reservados</p>
    </div>
  </div>

  <script>
    // Generate floating sparkles
    const container = document.getElementById('sparkles');
    const count = 18;
    for (let i = 0; i < count; i++) {
      const s = document.createElement('div');
      s.className = 'sparkle';
      const size = Math.random() * 6 + 3;
      s.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        left: ${Math.random() * 100}%;
        top: ${Math.random() * 100}%;
        --dur: ${Math.random() * 3 + 2.5}s;
        --delay: ${Math.random() * 4}s;
      `;
      container.appendChild(s);
    }
  </script>

</body>
</html>
